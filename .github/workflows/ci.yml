name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio ruff mypy build

      - name: Run lint
        run: ruff check .

      - name: Run scoped type check
        run: python -m mypy src/research_mcp/__init__.py src/research_mcp/external_catalog.py src/research_mcp/mcp_bridge.py

      - name: Vendor PFC documentation source
        run: python scripts/vendor_external_mcps.py pfc-mcp

      - name: Run tests
        run: pytest tests/ -v

      - name: Build package
        run: python -m build

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import research_mcp; print(research_mcp.__version__)"
          python -c "import importlib.metadata as m; eps = [ep for ep in m.entry_points(group='console_scripts') if ep.name == 'research-mcp']; assert eps and eps[0].value == 'research_mcp.server:main'"
